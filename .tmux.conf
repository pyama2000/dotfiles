##############################
# Server options             #
##############################
# Near-zero ESC delay without swallowing real escape sequences
set -s escape-time 10

# Pass focus events through to applications (nvim autoread / FocusGained)
set -s focus-events on

# CSI u modified keys (supported by WezTerm)
set -s extended-keys on

# Let programs inside tmux (e.g. nvim) reach the system clipboard via OSC 52
set -s set-clipboard on

##############################
# Config                     #
##############################
# Interval
set -g status-interval 1

# Change the prefix to Ctrl+g
unbind C-b
set -g prefix C-g
bind C-g send-prefix

# Enable window's index renumber
set -g renumber-windows on

# Enable to scroll 50,000 lines
set -g history-limit 50000

# Enable mouse
set -g mouse on
bind -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind -T edit-mode-vi WheelDownPane send-keys -X scroll-down

# Use vim keybind in copy mode
setw -g mode-keys vi

# Use clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Don't finish copy mode with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

##############################
# Shell                      #
##############################
set -g default-shell /run/current-system/sw/bin/fish

##############################
# Window configure           #
##############################
# Start window index 1
set -g base-index 1

# Create new window with current directory
bind -T prefix c new-window -c "#{pane_current_path}"

##############################
# Pane configure             #
##############################
# Start pane index 1
set -g pane-base-index 1

# Split the pane horizon with current directory
bind | split-window -h -c "#{pane_current_path}"

# Split the pane vertical with current directory
bind - split-window -v -c "#{pane_current_path}"

# Move to the pane like vim key bind
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##############################
# UI                         #
##############################
# True color and modern terminal features
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"

## COLORSCHEME: Kanagawa (matches WezTerm "Kanagawa (Gogh)")
set -g status "on"

# default statusbar color
set -g status-style "bg=#1f1f28,fg=colour223"

# default window title colors
setw -g window-status-style bg=colour214,fg=colour237 # bg=yellow, fg=bg1

# default window with an activity alert
setw -g window-status-activity-style bg=colour237,fg=colour248 # bg=bg1, fg=fg3

# active window title colors
setw -g window-status-current-style bg=red,fg=colour237 # fg=bg1

# pane border
set -g pane-active-border-style fg=colour250 #fg2
set -g pane-border-style fg=colour237 #bg1

# message infos
set -g message-style bg=colour239,fg=colour223 # bg=bg2, fg=fg1

# writing commands inactive
set -g message-command-style bg=colour239,fg=colour223 # bg=fg3, fg=bg1

# pane number display
set -g display-panes-active-colour colour250 #fg2
set -g display-panes-colour colour237 #bg1

# clock
setw -g clock-mode-colour colour109 #blue

# bell
setw -g window-status-bell-style bg=colour167,fg=colour235 # bg=red, fg=bg

## Theme settings mixed with colors (unfortunately, but there is no cleaner way)
set -g status-justify "left"
set -g status-left-style none
set -g status-left-length "80"
set -g status-right-style none
set -g status-right-length "80"
setw -g window-status-separator ""

set -g status-left "#[bg=#7e9cd8,fg=#1f1f28] #P #[bg=#1f1f28,fg=#7e9cd8,nobold,noitalics,nounderscore]"
set -g status-right "#[bg=#1f1f28,fg=#c8c093] %Y-%m-%d  %H:%M:%S #[bg=#1f1f28,fg=#7E9CD8,nobold,noitalics,nounderscore]#[bg=#7e9cd8,fg=#1f1f28] #h "

setw -g window-status-current-format "#[bg=#7e9cd8,fg=#1f1f28,nobold,noitalics,nounderscore]#[bg=#7e9cd8,fg=#1f1f28] #I #[bg=#7e9cd8,fg=#1f1f28,bold] #W#{?window_zoomed_flag,*Z,} #[bg=#1f1f28,fg=#7e9cd8,nobold,noitalics,nounderscore]"
setw -g window-status-format "#[bg=colour239,fg=#1f1f28,noitalics]#[bg=colour239,fg=colour223] #I #[bg=colour239,fg=colour223] #W #[bg=#1f1f28,fg=colour239,noitalics]"

