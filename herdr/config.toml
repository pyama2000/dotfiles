# Herdr 設定(.tmux.conf からの移行)。
# .tmux.conf にあって Herdr(0.7.1)に相当設定がない/不要なもの:
# - vi コピーモード + pbcopy → Herdr は prefix+e(edit_scrollback)でスクロール
#   バックをエディタで開く方式。クリップボードは OSC52 を Herdr が処理する。
# - ステータスバー装飾 → Herdr はサイドバー方式で、配色はテーマが担当する。
# - escape-time / focus-events / extended-keys / set-clipboard / base-index /
#   renumber-windows → Herdr が内部処理(タブは元々 1 始まり)。
# - history-limit 50000 → scrollback_limit_bytes のデフォルト 10MB で同等。

[theme]
# tmux の Kanagawa 配色(wezterm "Kanagawa (Gogh)" と統一)
name = "kanagawa"

[terminal]
# tmux の default-shell 相当
default_shell = "/run/current-system/sw/bin/fish"
# new_cwd = "follow"(デフォルト)が tmux の -c "#{pane_current_path}" 相当

[keys]
# tmux の prefix C-g を踏襲
prefix = "ctrl+g"
# tmux の左右分割(|)/ 上下分割(-)を踏襲。
# | は Shift+\ を押すと端末が「shift+backslash イベント」ではなく解決後の
# 文字 | を送るため、修飾キーを分離した "prefix+shift+backslash" ではなく
# 文字そのものを指す "prefix+|" で指定する(- を "prefix+minus" で指定して
# いるのと同じ流儀。ドキュメントの「修飾キー付き記号は端末依存」の警告は
# shift+backslash のような修飾キー分離指定が対象で、解決後の文字指定なら回避できる)。
# split_vertical   = 縦の仕切り線 = 左右に並ぶ(tmux の split-window -h 相当)
# split_horizontal = 横の仕切り線 = 上下に並ぶ(tmux の split-window -v 相当)
split_vertical = "prefix+|"
split_horizontal = "prefix+minus"
# new_tab (prefix+c) / focus_pane (prefix+h/j/k/l) / zoom (prefix+z) は
# Herdr デフォルトが tmux 設定と一致するため未指定。
# tmux のリネームを踏襲。tmux のセッション = Herdr の workspace、
# tmux のウィンドウ = Herdr の tab に対応する。
# $ は Shift+4 の解決後の文字を指定する(| と同じ流儀)。
rename_workspace = "prefix+$" # tmux: prefix $（rename-session）
rename_tab = "prefix+,"       # tmux: prefix ,（rename-window）
# workspace(tmux の session 相当)の前後移動。Herdr デフォルトは未バインドなので明示する。
# [ ] はコピーモードで使うため避け、9/0 を割り当てる。
previous_workspace = "prefix+9" # 前の workspace へ
next_workspace = "prefix+0"     # 次の workspace へ
# agent を順番に移動。インデックス指定(focus_agent)は範囲が 1..9 全域固定で
# 数字キーと衝突するため、単一キーの順送り next_agent / previous_agent を使う。
next_agent = "prefix+f"     # 次の agent へ
previous_agent = "prefix+b" # 前の agent へ(元の toggle_sidebar は prefix+d へ退避)
# toggle_sidebar は default で prefix+b。previous_agent に譲るため prefix+d へ移す。
toggle_sidebar = "prefix+d"
# session navigator(OpenNavigator)を tmux の prefix+s(choose-tree) に合わせて割り当てる。
# config キー名は goto(default-config で settings/workspace_picker と 1:1 対応する OpenNavigator)。
# settings が default で prefix+s を使い衝突するため、settings は prefix+shift+s へ退避。
goto = "prefix+s"               # tmux: prefix s（choose-tree / セッション選択）
settings = "prefix+shift+s"     # 退避先(元は prefix+s)

[ui]
# tmux の new-window と同様、名前入力なしで即タブ作成
prompt_new_tab_name = false
agent_panel_sort = "spaces"
show_agent_labels_on_pane_borders = true

# バックグラウンドのワークスペースでエージェントの状態が変わったときの通知配信。
# delivery は単一値(off/herdr/terminal/system)で、配列指定は不可
# (配列にすると "expected string only" で弾かれる)。
# terminal = 内部生成したトーストを OSC エスケープで外側の端末(wezterm)に転送し、
#   macOS のデスクトップ通知として出す。別アプリを最前面にしていても気づける。
#   system(herdr が OS の通知 API を直接叩く)との違いは「wezterm 経由か herdr 直接か」で、
#   herdr --remote 時に手元の端末側で鳴るのは terminal のほう。
[ui.toast]
delivery = "terminal"

[experimental]
# prefix モード(prefix = ctrl+g)の待ち受け中だけ、macOS のホスト入力ソースを
# 一時的に ASCII(英数)へ切り替え、抜けたら元の IME に戻す。日本語入力 ON のまま
# prefix コマンド(prefix+c で new_tab、prefix+| で split など)を押しても、続きの
# キーが IME に食われず確実に登録される。macOS 限定・best-effort。tmux にはない機能。
switch_ascii_input_source_in_prefix = true
