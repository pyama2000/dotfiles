# Herdr 設定(.tmux.conf からの移行)。
# .tmux.conf にあって Herdr(0.7.1)に相当設定がない/不要なもの:
# - vi コピーモード + pbcopy → Herdr は prefix+e(edit_scrollback)でスクロール
#   バックをエディタで開く方式。クリップボードは OSC52 を Herdr が処理する。
# - ステータスバー装飾 → Herdr はサイドバー方式で、配色はテーマが担当する。
# - escape-time / focus-events / extended-keys / set-clipboard / base-index /
#   renumber-windows → Herdr が内部処理(タブは元々 1 始まり)。
# - history-limit 50000 → scrollback_limit_bytes のデフォルト 10MB で同等。

[theme]
# tmux の Kanagawa 配色(wezterm "Kanagawa (Gogh)" と統一)
name = "kanagawa"

[terminal]
# tmux の default-shell 相当
default_shell = "/run/current-system/sw/bin/fish"
# new_cwd = "follow"(デフォルト)が tmux の -c "#{pane_current_path}" 相当

[keys]
# tmux の prefix C-g を踏襲
prefix = "ctrl+g"
# tmux の左右分割(|)/ 上下分割(-)を踏襲。左右分割は元々 | に割り当てて
# いたが、修飾キー付き記号(prefix+shift+backslash)は端末依存で届かず動作
# しなかったため、Herdr デフォルトの prefix+v に戻した。上下分割の - は
# Herdr デフォルトと同じ。
# split_vertical   = 縦の仕切り線 = 左右に並ぶ(tmux の split-window -h 相当)
# split_horizontal = 横の仕切り線 = 上下に並ぶ(tmux の split-window -v 相当)
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
# new_tab (prefix+c) / focus_pane (prefix+h/j/k/l) / zoom (prefix+z) は
# Herdr デフォルトが tmux 設定と一致するため未指定。

[ui]
# tmux の new-window と同様、名前入力なしで即タブ作成
prompt_new_tab_name = false
agent_panel_sort = "spaces"
