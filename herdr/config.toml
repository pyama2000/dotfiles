# Herdr 設定。キーバインドは「ドメイン層 × 共通動詞」体系。
#
# 体系:
#   - prefix = ctrl+g(tmux 時代から維持)
#   - ドメインごとに修飾キー層を割り当てる:
#       無印  = tab / pane(日常操作の基準層)
#       shift = workspace
#       ctrl  = agent
#       alt   = worktree
#   - 動詞キーは全ドメイン共通: c=新規, n/p=次・前, x=閉じる, 1..9=ジャンプ。
#     リネームのみ例外: tab=, pane=. workspace=$(tmux 由来を維持)
#     agent のジャンプも例外で alt+1..9(ctrl+数字 が使えない事情は該当箇所参照)
#   - ドメイン入口キー: s=workspace navigator, t=worktree を開く,
#     a=agent サイドバー, w=workspace picker(デフォルト維持)
#
# 記号キーは「修飾キー分離(shift+comma 等)」ではなく端末が送る解決後の
# 文字($ | 等)か名前付き記号(minus)で指定する。修飾キー分離指定は
# 端末依存の警告対象だが、解決後文字なら回避できる。

[theme]
# tmux の Kanagawa 配色(wezterm "Kanagawa (Gogh)" と統一)
name = "kanagawa"

[terminal]
# tmux の default-shell 相当
default_shell = "/run/current-system/sw/bin/fish"
# new_cwd = "follow"(デフォルト)が tmux の -c "#{pane_current_path}" 相当

[keys]
prefix = "ctrl+g"

# --- Pane(無印層・tmux 踏襲) ---
# focus h/j/k/l, swap shift+h/j/k/l, zoom z, close x, resize r,
# scrollback e, copy [, cycle tab/shift+tab は Herdr デフォルトのまま。
split_vertical = "prefix+|"       # 縦の仕切り線 = 左右に並ぶ(tmux の split-window -h 相当)
split_horizontal = "prefix+minus" # 横の仕切り線 = 上下に並ぶ(tmux の split-window -v 相当)
# rename_pane のデフォルト shift+p は previous_workspace と衝突するため、
# rename_tab(,)の隣の . へ移す。
rename_pane = "prefix+."

# --- Tab(無印層 = 動詞の基準) ---
# new_tab(c) / next_tab(n) / previous_tab(p) / switch_tab(1..9) は
# デフォルトが体系と一致するため未指定。
rename_tab = "prefix+,"
# close_tab はキーを割り当てない(タブは全ペインを閉じれば消える運用)。
# デフォルトの shift+x は close_workspace に譲る(ユーザーバインドが
# 衝突するデフォルトを押しのける 0.7.1 以降の仕様で自動的に未バインド化)。
close_tab = []

# --- Workspace(shift 層・入口 s) ---
goto = "prefix+s"           # workspace navigator(tmux choose-tree の記憶)
settings = "prefix+shift+s" # デフォルト prefix+s を goto に譲るため退避
new_workspace = "prefix+shift+c"
next_workspace = "prefix+shift+n"
previous_workspace = "prefix+shift+p"
rename_workspace = "prefix+$" # tmux の rename-session を維持($ = Shift+4 の解決後文字)
close_workspace = "prefix+shift+x"
switch_workspace = "prefix+shift+1..9"
# workspace_picker はデフォルト prefix+w のまま。

# --- Worktree(alt 層・入口 t) ---
open_worktree = "prefix+t"
new_worktree = "prefix+alt+c" # デフォルト shift+g から移動
remove_worktree = "prefix+alt+x"

# --- Agent(ctrl 層・入口 a) ---
toggle_sidebar = "prefix+a" # デフォルト prefix+b から移動
next_agent = "prefix+ctrl+n"
previous_agent = "prefix+ctrl+p"
# ジャンプのみ alt 層に置く例外。ctrl+数字 は kitty キーボードプロトコルが
# ないと表現できず、wezterm 20240203 で有効化すると Esc が壊れる既知バグ
# (wezterm#3621)を踏むため断念した(詳細は wezterm.lua のコメント参照)。
# alt+数字 はレガシーエンコーディング(ESC 数字)で表現できる。
# worktree(alt 層)には 1..9 動詞がないため衝突しない。
focus_agent = "prefix+alt+1..9"

# --- Plugin: reviewr(persiyanov/herdr-reviewr) ---
# エージェントの差分をレビューするプラグイン。開き方はプラグイン側設定
# (plugins/config/persiyanov.reviewr/config.toml)の toggle_placement = "overlay"
# でポップアップ相当にしている。レビュー対象はエージェントなので ctrl 層の r。
# (無印 prefix+r はデフォルトの pane resize が使用済み)
[[keys.command]]
key = "prefix+ctrl+r"
type = "plugin_action"
command = "persiyanov.reviewr.toggle"
description = "reviewr を開閉"

[ui]
# tmux の new-window と同様、名前入力なしで即タブ作成
prompt_new_tab_name = false
agent_panel_sort = "spaces"
show_agent_labels_on_pane_borders = true

# バックグラウンドのワークスペースでエージェントの状態が変わったときの通知配信。
# delivery は単一値(off/herdr/terminal/system)で、配列指定は不可
# (配列にすると "expected string only" で弾かれる)。
# terminal = 内部生成したトーストを OSC エスケープで外側の端末(wezterm)に転送し、
#   macOS のデスクトップ通知として出す。別アプリを最前面にしていても気づける。
#   system(herdr が OS の通知 API を直接叩く)との違いは「wezterm 経由か herdr 直接か」で、
#   herdr --remote 時に手元の端末側で鳴るのは terminal のほう。
[ui.toast]
delivery = "terminal"
