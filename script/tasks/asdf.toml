[tasks.setup_asdf]
category = "asdf"
description = "Setup asdf"
run_task = { name = ["install_asdf"] }

[tasks.update_asdf]
category = "asdf"
description = "Update asdf"
# asdf 本体の更新は macOS では Nix(nix flake update)が担当します。
# Nix 提供の asdf(Go版)では `asdf update` は非対応メッセージを出すだけなので、
# 共通処理は plugin 更新のみとし、自己更新は Linux 限定にします。
script = [
'''
#!/usr/bin/env bash

if !(type asdf > /dev/null 2>&1); then
  source $HOME/.asdf/asdf.sh
fi

asdf plugin update --all
'''
]

# Linux では git clone した asdf(0.9.0)の自己更新も行います。
[tasks.update_asdf.linux]
category = "asdf"
description = "Update asdf"
script = [
'''
#!/usr/bin/env bash

if !(type asdf > /dev/null 2>&1); then
  source $HOME/.asdf/asdf.sh
fi

asdf update
asdf plugin update --all
'''
]

[tasks.uninstall_asdf]
category = "asdf"
description = "Uninstall asdf"
script = [
'''
#!/usr/bin/env bash

rm -rf ${ASDF_DIR:-$HOME/.asdf} $HOME/.tool-versions
'''
]

# macOS では asdf バイナリを Nix(home-manager の home.packages の asdf-vm)で管理しています。
# 以下は asdf を git clone する Linux 専用タスクです（macOS では何も実行されません）。
[tasks.install_asdf.linux]
private = true
dependencies = ["dependencies_asdf"]
script = [
'''
#!/usr/bin/env bash

git clone https://github.com/asdf-vm/asdf.git $HOME/.asdf --branch v0.9.0
mkdir -p $HOME/.config/fish/completions
ln -s $HOME/.asdf/completions/asdf.fish $HOME/.config/fish/completions/
echo '. $HOME/.asdf/asdf.sh' >> $HOME/.bashrc
'''
]

[tasks.dependencies_asdf.linux]
private = true
script = [
'''
#!/usr/bin/env bash

sudo apt install -y curl git
'''
]
