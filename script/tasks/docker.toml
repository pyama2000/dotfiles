# このファイルは macOS 向けの lima ベース Docker 環境構築です。
# docker CLI / docker-compose / docker-buildx / lima の各バイナリは Nix(home-manager の
# home.packages、docker プラグインは ~/.docker/cli-plugins への symlink)で管理しているため、
# ここでは VM の作成・起動と docker context など「ランタイム状態」のみを扱います。

[tasks.setup_docker.mac]
category = "Docker"
description = "Install Docker"
dependencies = ["setup_lima"]
script = [
'''
#!/usr/bin/env bash
set -eux -o pipefail

docker context create "lima-docker" \
  --docker host="unix://$HOME/.lima/docker/sock/docker.sock"
docker context create "lima-docker-rosetta" \
  --docker host="unix://$HOME/.lima/docker-rosetta/sock/docker.sock"
'''
]

[tasks.setup_lima.mac]
private = true
run_task = [{ name = ["upgrade_filedescriptor", "start_lima_default", "start_lima_amd"] }]

[tasks.start_lima_default.mac]
private = true
script = [
'''
#!/usr/bin/env bash
set -eux -o pipefail

limactl create \
    --name=docker \
    --mount="~/ghq:w" \
    template://docker-rootful
limactl start docker
limactl stop docker
'''
]

[tasks.start_lima_amd.mac]
private = true
script = [
'''
#!/usr/bin/env bash
set -eux -o pipefail

limactl create \
    --name=docker-rosetta \
    --vm-type=vz \
    --mount="~/ghq:w" \
    --mount-type=virtiofs \
    --network=vzNAT \
    --rosetta \
    template://docker-rootful
limactl start docker-rosetta
limactl stop docker-rosetta
'''
]

[tasks.upgrade_filedescriptor.mac]
private = true
condition = { profiles = ["production"] }
script = [
'''
#!/usr/bin/env bash
set -eux -o pipefail

sudo ln -snfv ~/dotfiles/lima/limit.maxfiles.plist /Library/LaunchDaemons/
sudo chown root /Library/LaunchDaemons/limit.maxfiles.plist
sudo launchctl load -w /Library/LaunchDaemons/limit.maxfiles.plist
'''
]
