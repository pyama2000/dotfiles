[tasks.install_cli]
category = "tools"
description = "Install CLI tools"
run_task = { name = [
  "install_fzf",
  "install_cargo-watch",
  "install_cargo-update",
] }

# fzf / cargo-watch / cargo-update は macOS では Nix(home-manager)で管理しているため、
# 以下は Linux 専用タスクです（macOS では何も実行されません）。

[tasks.install_fzf.linux]
private = true
script = [
'''
#!/usr/bin/env bash

git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf
yes | ~/.fzf/install
'''
]

[tasks.install_cargo-watch.linux]
private = true
script = [
'''
#!/usr/bin/env bash

cargo install cargo-watch
'''
]

[tasks.install_cargo-update.linux]
private = true
script = [
'''
#!/usr/bin/env bash

cargo install cargo-update
'''
]
