add_newline = false
# 遅い外部コマンド由来のモジュールでプロンプトが固まらないようにする
command_timeout = 1000

[directory]
truncation_length = 4
truncate_to_repo = true

# ahead/behind は記号のみ表示する（コミット数のカウントは出さない）
# ⇡: push できるローカルコミットあり / ⇣: origin に変更あり（pull 可能） / ⇕: 両方
[git_status]
ahead = "⇡"
behind = "⇣"
diverged = "⇕"

[cmd_duration]
disabled = true

# nix shell / nix develop 内であることを示す
[nix_shell]
heuristic = true

# クラウド系・package はノイズなので無効を維持する
[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true

[ruby]
disabled = true
